# Optional VPS SSH deploy — does NOT run on push until you add secrets and enable the trigger below.
#
# Secrets (Settings → Secrets and variables → Actions → New repository secret):
#   VPS_HOST          — e.g. 148.135.137.137 or myserver.example.com
#   VPS_USER          — e.g. ubuntu
#   VPS_SSH_KEY       — private key (full PEM) that can SSH to the VPS
#
# On the VPS once: add the matching public key to ~/.ssh/authorized_keys
# and chmod +x scripts/deploy-vps.sh (or: bash scripts/deploy-vps.sh).
#
# Hostinger “deploy from Git” in hPanel does not use this file — only a self-managed VPS + SSH does.
# After secrets are set, uncomment `push` so main-branch pushes deploy automatically.

name: Deploy VPS

on:
  workflow_dispatch:
  # Uncomment after VPS_HOST, VPS_USER, and VPS_SSH_KEY are configured:
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/website-feedback-tool
            bash scripts/deploy-vps.sh
